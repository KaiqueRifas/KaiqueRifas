<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel ADM</title>

  <link rel="stylesheet" href="style.css?v=50">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=50"></script>
</head>
<body>

<header class="topo">
  <h1>Painel ADM</h1>
  <button onclick="logout()">Sair</button>
</header>

<section class="card">
  <h2>Controle da Rifa</h2>
  <button onclick="ligar()">Ligar rifa</button>
  <button onclick="desligar()">Desligar rifa</button>
</section>

<section class="card">
  <h2>Ferramentas</h2>
  <button onclick="resetar()">RESETAR SISTEMA</button>
  <p id="msg"></p>
</section>

<section class="card">
  <h2>Itens reservados</h2>
  <div id="listaReservados" class="admin-lista"></div>
</section>

<section class="card">
  <h2>Itens pagos</h2>
  <div id="listaPagos" class="admin-lista"></div>
</section>

<script>
async function ligar(){
  const { error } = await sb
    .from("campaigns")
    .update({ ativa:true })
    .eq("id",1)

  document.getElementById("msg").innerText = error ? error.message : "Rifa ligada"
}

async function desligar(){
  const { error } = await sb
    .from("campaigns")
    .update({ ativa:false })
    .eq("id",1)

  document.getElementById("msg").innerText = error ? error.message : "Rifa desligada"
}

async function resetar(){
  if(!confirm("Resetar tudo?")) return

  const { error } = await sb
    .from("items")
    .update({
      status:"livre",
      usuario_id:null,
      reservado_em:null,
      reservado_ate:null,
      pago:false,
      reservado_email:null,
      reservado_telefone:null
    })
    .not("id","is",null)

  if(error){
    document.getElementById("msg").innerText = error.message
    return
  }

  document.getElementById("msg").innerText = "Sistema resetado"
  await carregar()
}

async function confirmar(id){
  const { error } = await sb
    .from("items")
    .update({
      status:"pago",
      pago:true
    })
    .eq("id",id)

  if(error){
    document.getElementById("msg").innerText = error.message
    return
  }

  document.getElementById("msg").innerText = "Pagamento confirmado"
  await carregar()
}

async function liberar(id){
  const { error } = await sb
    .from("items")
    .update({
      status:"livre",
      usuario_id:null,
      reservado_em:null,
      reservado_ate:null,
      pago:false,
      reservado_email:null,
      reservado_telefone:null
    })
    .eq("id",id)

  if(error){
    document.getElementById("msg").innerText = error.message
    return
  }

  document.getElementById("msg").innerText = "Item liberado"
  await carregar()
}

function criarCardAdmin(item){
  const email = item.reservado_email || "-"
  const telefone = item.reservado_telefone || "-"

  const card = document.createElement("div")
  card.className = "admin-item " + item.status

  card.innerHTML = `
    <h3>${item.nome}</h3>
    <p><b>Status:</b> ${item.status}</p>
    <p><b>Email:</b> ${email}</p>
    <p><b>Telefone:</b> ${telefone}</p>
  `

  return card
}

async function carregar(){
  const { data: items, error } = await sb
    .from("items")
    .select("*")
    .order("id")

  if(error){
    document.getElementById("msg").innerText = error.message
    return
  }

  const listaReservados = document.getElementById("listaReservados")
  const listaPagos = document.getElementById("listaPagos")

  listaReservados.innerHTML = ""
  listaPagos.innerHTML = ""

  items.forEach(item => {
    if(item.status === "reservado"){
      const card = criarCardAdmin(item)

      const acoes = document.createElement("div")
      acoes.className = "acoes"

      const btnConfirmar = document.createElement("button")
      btnConfirmar.innerText = "Confirmar"
      btnConfirmar.onclick = () => confirmar(item.id)

      const btnLiberar = document.createElement("button")
      btnLiberar.innerText = "Liberar"
      btnLiberar.onclick = () => liberar(item.id)

      acoes.appendChild(btnConfirmar)
      acoes.appendChild(btnLiberar)
      card.appendChild(acoes)

      listaReservados.appendChild(card)
    }

    if(item.status === "pago"){
      const card = criarCardAdmin(item)

      const acoes = document.createElement("div")
      acoes.className = "acoes"

      const btnLiberar = document.createElement("button")
      btnLiberar.innerText = "Liberar"
      btnLiberar.onclick = () => liberar(item.id)

      acoes.appendChild(btnLiberar)
      card.appendChild(acoes)

      listaPagos.appendChild(card)
    }
  })
}

async function logout(){
  await sb.auth.signOut()
  window.location.href = "login.html"
}

carregar()
</script>

</body>
</html>
