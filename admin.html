<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel ADM</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>

<header class="topo">
  <h1>Painel ADM</h1>
  <button onclick="logout()">Sair</button>
</header>

<section class="card">
  <h2>Controle da Rifa</h2>

  <button onclick="ligar()">Ligar rifa</button>
  <button onclick="desligar()">Desligar rifa</button>
</section>

<section class="card">
  <h2>Ferramentas</h2>

  <button onclick="resetar()">RESETAR SISTEMA</button>
</section>

<section class="card">
  <h2>Itens reservados</h2>
  <div id="listaReservados"></div>
</section>

<section class="card">
  <h2>Itens pagos</h2>
  <div id="listaPagos"></div>
</section>

<script>
  async function ligar() {
    await sb
      .from("campaigns")
      .update({ ativa: true })
      .eq("id", 1)

    alert("Rifa ligada")
  }

  async function desligar() {
    await sb
      .from("campaigns")
      .update({ ativa: false })
      .eq("id", 1)

    alert("Rifa desligada")
  }

  async function resetar() {
    if (!confirm("Resetar tudo?")) return

    await sb
      .from("items")
      .update({
        status: "livre",
        usuario_id: null,
        reservado_em: null,
        reservado_ate: null,
        pago: false,
        reservado_email: null,
        reservado_telefone: null
      })
      .neq("id", 0)

    alert("Sistema resetado")
    carregar()
  }

  async function confirmar(id) {
    await sb
      .from("items")
      .update({
        status: "pago",
        pago: true
      })
      .eq("id", id)

    carregar()
  }

  async function liberar(id) {
    await sb
      .from("items")
      .update({
        status: "livre",
        usuario_id: null,
        reservado_em: null,
        reservado_ate: null,
        pago: false,
        reservado_email: null,
        reservado_telefone: null
      })
      .eq("id", id)

    carregar()
  }
