<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel ADM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{font-family:Arial;background:#f3f3f3;margin:0;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
input,textarea{width:100%;padding:10px;margin-top:10px}
button{padding:10px 20px;margin-top:10px}
</style>
</head>

<body>

<div class="card">
<h2>Editar rifa</h2>

<input id="nome" placeholder="Nome da rifa">
<input id="valor" type="number" placeholder="Valor">
<textarea id="premio" placeholder="Premiações"></textarea>
<input id="pix" placeholder="Pix">

<button onclick="salvar()">Salvar</button>
<button onclick="desligar()">Desligar rifa</button>

<p id="msg"></p>
</div>

<script>

async function carregar(){

const {data}=await sb
.from("campaigns")
.select("*")
.eq("id",1)
.single()

document.getElementById("nome").value=data.nome_rifa||""
document.getElementById("valor").value=data.valor||""
document.getElementById("premio").value=data.premiacao||""
document.getElementById("pix").value=data.chave_pix||""

}

async function salvar(){

const nome=document.getElementById("nome").value
const valor=document.getElementById("valor").value
const premio=document.getElementById("premio").value
const pix=document.getElementById("pix").value

const {error}=await sb
.from("campaigns")
.update({
nome_rifa:nome,
valor:valor,
premiacao:premio,
chave_pix:pix,
ativa:true
})
.eq("id",1)

if(error){
document.getElementById("msg").innerText=error.message
return
}

document.getElementById("msg").innerText="Rifa salva e ligada"

}

async function desligar(){

const {error}=await sb
.from("campaigns")
.update({
ativa:false,
nome_rifa:"",
valor:0,
premiacao:"",
chave_pix:""
})
.eq("id",1)

if(error){
document.getElementById("msg").innerText=error.message
return
}

document.getElementById("msg").innerText="Rifa desligada"

}

carregar()

</script>

</body>
</html>
