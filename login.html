<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kaique Rifas</title>

  <link rel="stylesheet" href="style.css?v=21">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=21"></script>
</head>
<body>

  <div class="login-box">
    <h2>Entrar</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <input type="tel" id="telefone" placeholder="Telefone (só para cadastro)">

    <button type="button" onclick="login()">Entrar</button>

    <hr>

    <button type="button" onclick="criarConta()">Criar conta</button>

    <p id="mensagem"></p>

    <div id="debugLogin"></div>
  </div>

  <script>
    const mensagem = document.getElementById("mensagem")
    const debugLogin = document.getElementById("debugLogin")

    function debug(texto) {
      const p = document.createElement("p")
      p.innerText = texto
      debugLogin.appendChild(p)
    }

    async function login() {
      try {
        mensagem.innerText = "Entrando..."
        debug("Clicou em Entrar")

        if (!window.sb) {
          mensagem.innerText = "Erro no config.js"
          debug("window.sb não encontrado")
          return
        }

        const email = document.getElementById("email").value.trim()
        const senha = document.getElementById("senha").value.trim()

        if (!email || !senha) {
          mensagem.innerText = "Preencha email e senha"
          debug("Campos vazios no login")
          return
        }

        const { error } = await window.sb.auth.signInWithPassword({
          email: email,
          password: senha
        })

        if (error) {
          mensagem.innerText = error.message
          debug("Erro login: " + error.message)
          return
        }

        debug("Login OK")
        mensagem.innerText = "Login realizado"
        window.location.href = "index.html"
      } catch (e) {
        mensagem.innerText = "Erro ao entrar"
        debug("Catch login: " + e.message)
      }
    }

    async function criarConta() {
      try {
        mensagem.innerText = "Criando conta..."
        debug("Clicou em Criar conta")

        if (!window.sb) {
          mensagem.innerText = "Erro no config.js"
          debug("window.sb não encontrado")
          return
        }

        const email = document.getElementById("email").value.trim()
        const senha = document.getElementById("senha").value.trim()
        const telefone = document.getElementById("telefone").value.trim()

        if (!email || !senha || !telefone) {
          mensagem.innerText = "Preencha email, senha e telefone"
          debug("Campos vazios no cadastro")
          return
        }

        const { data, error } = await window.sb.auth.signUp({
          email: email,
          password: senha,
          options: {
            data: {
              telefone: telefone
            }
          }
        })

        if (error) {
          mensagem.innerText = error.message
          debug("Erro criar conta: " + error.message)
          return
        }

        if (data.user) {
          mensagem.innerText = "Conta criada. Agora clique em Entrar."
          debug("Conta criada OK")
          return
        }

        mensagem.innerText = "Conta criada"
        debug("Conta criada sem retorno de user")
      } catch (e) {
        mensagem.innerText = "Erro ao criar conta"
        debug("Catch criarConta: " + e.message)
      }
    }

    debug("Login carregado")
    debug(window.sb ? "Supabase OK" : "Supabase NÃO carregou")
  </script>
</body>
</html>
