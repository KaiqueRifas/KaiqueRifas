<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>

  <div class="login-box">
    <h2>Criar conta</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <input type="tel" id="telefone" placeholder="Telefone">

    <button onclick="criarConta()">Criar conta</button>

    <br><br>

    <button onclick="voltar()">Voltar para login</button>

    <p id="msg"></p>
  </div>

  <script>
    async function criarConta() {
      const email = document.getElementById("email").value.trim()
      const senha = document.getElementById("senha").value.trim()
      const telefone = document.getElementById("telefone").value.trim()

      if (!email || !senha || !telefone) {
        document.getElementById("msg").innerText = "Preencha todos os campos"
        return
      }

      const { data, error } = await sb.auth.signUp({
        email: email,
        password: senha
      })

      if (error) {
        document.getElementById("msg").innerText = error.message
        return
      }

      if (data.user) {
        await sb.from("profiles").upsert({
          id: data.user.id,
          email: email,
          telefone: telefone
        })

        document.getElementById("msg").innerText = "Conta criada com sucesso"
        return
      }

      document.getElementById("msg").innerText = "Conta criada"
    }

    function voltar() {
      window.location.href = "login.html"
    }
  </script>

</body>
</html>
