<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kaique Rifas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{font-family:Arial;background:#f3f3f3;margin:0;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px}
</style>
</head>

<body>

<div class="card">

<h2 id="titulo"></h2>

<p id="status"></p>
<p id="valor"></p>
<p id="premio"></p>
<p id="pix"></p>

</div>

<script>

async function carregar(){

const {data}=await sb
.from("campaigns")
.select("*")
.eq("id",1)
.single()

if(!data.ativa){

document.getElementById("titulo").innerText="Rifa"
document.getElementById("status").innerText="Rifa desligada"
document.getElementById("valor").innerText=""
document.getElementById("premio").innerText=""
document.getElementById("pix").innerText=""

return
}

document.getElementById("titulo").innerText=data.nome_rifa
document.getElementById("status").innerText="Rifa ligada"
document.getElementById("valor").innerText="Valor: R$ "+data.valor
document.getElementById("premio").innerText="Premiações: "+data.premiacao
document.getElementById("pix").innerText="Pix: "+data.chave_pix

}

carregar()

setInterval(carregar,2000)

</script>

</body>
</html>
